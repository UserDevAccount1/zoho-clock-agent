name: Keep Alive

# GitHub disables cron workflows after 60 days of repo inactivity.
# This workflow runs weekly to keep the repo active and prevent that.

on:
  schedule:
    - cron: '0 12 * * 3'  # Every Wednesday at noon UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive ping
        run: echo "Keepalive $(date -u)"
