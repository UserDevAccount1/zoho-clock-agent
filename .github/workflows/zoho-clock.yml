name: Zoho Clock In/Out

on:
  schedule:
    # Clock In: ~8:00 AM Manila (set 30min early to compensate for GitHub cron delay)
    # 23:30 UTC Sun-Thu = 7:30 AM Manila Mon-Fri + ~30min delay = ~8:00 AM
    - cron: '30 23 * * 0-4'
    # Clock Out: ~5:00 PM Manila (set 30min early to compensate for GitHub cron delay)
    # 08:30 UTC Mon-Fri = 4:30 PM Manila + ~30min delay = ~5:00 PM
    - cron: '30 8 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'Clock action'
        required: true
        default: 'clockout'
        type: choice
        options:
          - clockin
          - clockout

jobs:
  clock:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 23 * * 0-4" ]; then
            echo "action=clockin" >> $GITHUB_OUTPUT
          else
            echo "action=clockout" >> $GITHUB_OUTPUT
          fi

      - name: Run Zoho ${{ steps.action.outputs.action }}
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node .github/scripts/clock-action.js ${{ steps.action.outputs.action }}

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ steps.action.outputs.action }}-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
