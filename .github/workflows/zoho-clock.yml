name: Zoho Clock In/Out

on:
  schedule:
    # Clock In: 8:00 AM Manila (00:00 UTC), Monday-Friday
    - cron: '0 0 * * 1-5'
    # Clock Out: 5:00 PM Manila (09:00 UTC), Monday-Friday
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'Clock action'
        required: true
        default: 'clockout'
        type: choice
        options:
          - clockin
          - clockout

jobs:
  clock:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "action=clockin" >> $GITHUB_OUTPUT
            else
              echo "action=clockout" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run Zoho ${{ steps.action.outputs.action }}
        env:
          ZOHO_EMAIL: ${{ secrets.ZOHO_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_PASSWORD }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node .github/scripts/clock-action.js ${{ steps.action.outputs.action }}

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ steps.action.outputs.action }}-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
